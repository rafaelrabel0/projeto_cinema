<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand" href="index.html">Cinema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro-sessoes.html">Sessões</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Venda de Ingressos</a></li>
                    <li class="nav-item"><a class="nav-link" href="sessoes.html">Sessões Disponíveis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <h4 class="mb-3">Nova Sessão</h4>
                <form id="formSessao">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="mb-3">
                        <label for="filme" class="form-label">Filme</label>
                        <select class="form-select" id="filme" required>
                            <option value="">Selecione</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="sala" class="form-label">Sala</label>
                        <select class="form-select" id="sala" required>
                            <option value="">Selecione</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="dataHora" class="form-label">Data e Hora</label>
                        <input type="datetime-local" class="form-control" id="dataHora" required>
                    </div>
                    <div class="mb-3">
                        <label for="preco" class="form-label">Preço</label>
                        <input type="number" class="form-control" id="preco" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="idioma" class="form-label">Idioma</label>
                        <select class="form-select" id="idioma" required>
                            <option value="">Selecione</option>
                            <option value="Dublado">Dublado</option>
                            <option value="Legendado">Legendado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="formato" class="form-label">Formato</label>
                        <select class="form-select" id="formato" required>
                            <option value="">Selecione</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
                    <button type="button" class="btn btn-outline-light d-none" id="btnCancelar">Cancelar</button>
                </form>
            </div>
            <div class="col-lg-8">
                <h4 class="mb-3">Sessões Cadastradas</h4>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Filme</th>
                                <th>Sala</th>
                                <th>Data/Hora</th>
                                <th>Preço</th>
                                <th>Idioma</th>
                                <th>Formato</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaSessoes"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/classes.js"></script>
    <script src="js/cadastro-sessoes.js"></script>
</body>
</html>

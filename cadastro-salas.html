<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Salas</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand" href="index.html">Cine Belo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Venda de Ingressos</a></li>
                    <li class="nav-item"><a class="nav-link" href="sessoes.html">Sessões Disponíveis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <h4 class="mb-3">Nova Sala</h4>
                <form id="formSala">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="mb-3">
                        <label for="nomeSala" class="form-label">Nome da Sala</label>
                        <input type="text" class="form-control" id="nomeSala" required>
                    </div>
                    <div class="mb-3">
                        <label for="capacidade" class="form-label">Capacidade</label>
                        <input type="number" class="form-control" id="capacidade" required>
                    </div>
                    <div class="mb-3">
                        <label for="tipo" class="form-label">Tipo</label>
                        <select class="form-select" id="tipo" required>
                            <option value="">Selecione</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                            <option value="IMAX">IMAX</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
                    <button type="button" class="btn btn-outline-light d-none" id="btnCancelar">Cancelar</button>
                </form>
            </div>
            <div class="col-lg-8">
                <h4 class="mb-3">Salas Cadastradas</h4>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Capacidade</th>
                                <th>Tipo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaSalas"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/classes.js"></script>
    <script src="js/cadastro-salas.js"></script>
</body>
</html>

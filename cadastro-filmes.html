<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand" href="index.html">Cinema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Venda de Ingressos</a></li>
                    <li class="nav-item"><a class="nav-link" href="sessoes.html">Sessões Disponíveis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <h4 class="mb-3">Novo Filme</h4>
                <form id="formFilme">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título</label>
                        <input type="text" class="form-control" id="titulo" required>
                    </div>
                    <div class="mb-3">
                        <label for="genero" class="form-label">Gênero</label>
                        <input type="text" class="form-control" id="genero" required>
                    </div>
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" rows="2" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="classificacao" class="form-label">Classificação Indicativa</label>
                        <select class="form-select" id="classificacao" required>
                            <option value="">Selecione</option>
                            <option value="Livre">Livre</option>
                            <option value="10">10 anos</option>
                            <option value="12">12 anos</option>
                            <option value="14">14 anos</option>
                            <option value="16">16 anos</option>
                            <option value="18">18 anos</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="duracao" class="form-label">Duração (minutos)</label>
                        <input type="number" class="form-control" id="duracao" required>
                    </div>
                    <div class="mb-3">
                        <label for="dataEstreia" class="form-label">Data de Estreia</label>
                        <input type="date" class="form-control" id="dataEstreia" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
                    <button type="button" class="btn btn-outline-light d-none" id="btnCancelar">Cancelar</button>
                </form>
            </div>
            <div class="col-lg-8">
                <h4 class="mb-3">Filmes Cadastrados</h4>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Gênero</th>
                                <th>Classificação</th>
                                <th>Duração</th>
                                <th>Estreia</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaFilmes"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/classes.js"></script>
    <script src="js/cadastro-filmes.js"></script>
</body>
</html>
